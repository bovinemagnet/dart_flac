name: dart_flac
description: Pure-Dart FLAC decoder. Reads metadata, decodes LPC/FIXED subframes, verifies MD5, streams PCM to any audio sink. No native deps.
version: 0.2.0
repository: https://github.com/bovinemagnet/dart_flac

environment:
  sdk: ^3.0.0

executables:
  flac2wav:

dependencies:
  crypto: ^3.0.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
